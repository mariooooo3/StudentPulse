services:
  - type: web
    name: studentcompass
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TOTP_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
